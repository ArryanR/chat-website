{% extends 'base.html' %} {% block content %}
<form method="post" class="buttons glass-panel">
  <h2>Enter The Chat Room</h2>
  <div class="input-group">
    <label>Name:</label>
    <input
      type="text"
      placeholder="Pick a name!"
      name="name"
      value="{{name}}"
    />
  </div>
  <div class="join">
    <input type="text" placeholder="Room Code" name="code" value="{{code}}" />
    <button type="submit" name="join" class="neon-btn">Join a Room</button>
  </div>
  <button type="submit" name="create" class="create-btn neon-btn">Create a Room</button>
  {% if error %}
  <ul class="error-list">
    <li>{{error}}</li>
  </ul>
  {% endif %}
</form>
{% endblock %}
